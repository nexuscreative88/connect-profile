<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール登録 | Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="index.html" class="logo">Connect</a>
  <nav>
    <a href="index.html" class="active">プロフィール登録</a>
    <a href="profiles.html">参加者一覧</a>
  </nav>
</header>

<div class="hero">
  <h1>プロフィールを登録する</h1>
  <p>交流会の参加者にあなたを紹介しましょう</p>
</div>

<div class="container">
  <div class="card">

    <!-- 顔写真 -->
    <div class="form-group">
      <label>プロフィール写真</label>
      <div class="photo-area">
        <div class="photo-preview" id="photoPreview">
          <span class="placeholder">👤</span>
          <img id="photoImg" src="" alt="プレビュー" />
        </div>
        <div>
          <label for="photoFile" class="photo-upload-btn">📷 写真を選ぶ</label>
          <input type="file" id="photoFile" accept="image/*" />
          <p class="hint">JPG / PNG・推奨サイズ 400×400px</p>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- 氏名 -->
    <div class="form-group">
      <label for="name">氏名<span class="required">*</span></label>
      <input type="text" id="name" placeholder="山田 太郎" required />
    </div>

    <!-- ニックネーム -->
    <div class="form-group">
      <label for="nickname">ニックネーム（当日呼ばれたい名前）<span class="required">*</span></label>
      <input type="text" id="nickname" placeholder="たろう" required />
    </div>

    <!-- メール -->
    <div class="form-group">
      <label for="email">メールアドレス<span class="required">*</span></label>
      <input type="email" id="email" placeholder="your@email.com" required />
    </div>

    <!-- 所属・お仕事 -->
    <div class="form-group">
      <label for="company">所属・お仕事<span class="required">*</span></label>
      <input type="text" id="company" placeholder="株式会社〇〇 / フリーランス など" required />
    </div>

    <hr class="divider" />

    <!-- 活動エリア -->
    <div class="form-group">
      <label for="area">活動エリア</label>
      <input type="text" id="area" placeholder="東京・神奈川エリア など" />
    </div>

    <!-- LINE ID -->
    <div class="form-group">
      <label for="lineId">LINE ID</label>
      <input type="text" id="lineId" placeholder="your_line_id" />
    </div>

    <!-- インスタ -->
    <div class="form-group">
      <label for="instagram">インスタアカウント</label>
      <input type="text" id="instagram" placeholder="@yourhandle" />
    </div>

    <hr class="divider" />

    <!-- 得たいこと -->
    <div class="form-group">
      <label for="seeking">得たいこと・探していること</label>
      <textarea id="seeking" placeholder="今日の交流会で出会いたい人、求めているつながりや情報など。"></textarea>
    </div>

    <!-- 提供できること -->
    <div class="form-group">
      <label for="offering">提供できること・得意なこと</label>
      <textarea id="offering" placeholder="あなたが役立てること、得意なスキルや経験など。"></textarea>
    </div>

    <!-- 趣味 -->
    <div class="form-group">
      <label for="hobbies">趣味・ハマっていること</label>
      <textarea id="hobbies" placeholder="最近ハマっていること、趣味、休日の過ごし方など。"></textarea>
    </div>

    <!-- やりたいこと -->
    <div class="form-group">
      <label for="goals">これからやりたいこと・挑戦したいこと</label>
      <textarea id="goals" placeholder="近い将来のビジョン、挑戦したいこと、夢など。"></textarea>
    </div>

    <hr class="divider" />

    <!-- 登録の経緯 -->
    <div class="form-group">
      <label for="source">登録の経緯（知ったきっかけ）</label>
      <input type="text" id="source" placeholder="SNS / 紹介 / チラシ など" />
    </div>

    <!-- 紹介者名 -->
    <div class="form-group">
      <label for="referrer">紹介者名<span class="required">*</span></label>
      <input type="text" id="referrer" placeholder="紹介してくれた方のお名前" required />
    </div>

    <hr class="divider" />

    <!-- 決済状況 -->
    <div class="form-group">
      <label>決済状況</label>
      <p class="hint" style="font-size:.9rem; color:var(--gray-600);">💴 当日現金払い</p>
    </div>

    <!-- Submit -->
    <button class="btn btn-primary" id="submitBtn" onclick="submitProfile()">
      登録する
    </button>

    <div class="alert success" id="alertSuccess">
      ✅ 登録が完了しました！ありがとうございます。
    </div>
    <div class="alert error" id="alertError"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
