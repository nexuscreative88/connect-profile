<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参加者一覧 | Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="index.html" class="logo">Connect</a>
  <nav>
    <a href="index.html">プロフィール登録</a>
    <a href="profiles.html" class="active">参加者一覧</a>
  </nav>
</header>

<!-- パスワードゲート -->
<div class="password-gate" id="passwordGate">
  <div class="card">
    <h2>🔒 参加者一覧</h2>
    <p>閲覧するにはパスワードを入力してください</p>
    <div class="form-group">
      <input type="password" id="passwordInput" placeholder="パスワード" onkeydown="if(event.key==='Enter') checkPassword()" />
    </div>
    <button class="btn btn-primary" onclick="checkPassword()">確認する</button>
    <div class="alert error" id="pwError"></div>
  </div>
</div>

<!-- プロフィール一覧 -->
<div id="profiles-section">
  <div class="hero">
    <h1>参加者一覧</h1>
    <p>交流会にご参加のみなさんをご紹介します</p>
  </div>

  <div class="container wide">
    <div class="profiles-header">
      <h2>登録済みプロフィール</h2>
      <span class="profiles-count" id="profilesCount"></span>
    </div>

    <div class="profiles-grid" id="profilesGrid">
      <div class="loading">読み込み中...</div>
    </div>

    <div class="alert error" id="loadError"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
